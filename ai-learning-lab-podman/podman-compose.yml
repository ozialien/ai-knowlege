services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    security_opt:
      - label=disable

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - openwebui_data:/app/backend/data
    security_opt:
      - label=disable

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    security_opt:
      - label=disable

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    security_opt:
      - label=disable

  api:
    build:
      context: .
      dockerfile: apps/api/Containerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - qdrant
      - mlflow
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
    security_opt:
      - label=disable

volumes:
  ollama_data:
  openwebui_data:
  qdrant_data:
