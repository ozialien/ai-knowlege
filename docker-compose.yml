version: '3.9'
services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5000:5000"

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - qdrant
      - mlflow
